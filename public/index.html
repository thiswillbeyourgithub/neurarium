<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>neurarium</title>

    <!-- Optional privacy-friendly umami metrics. app-config.js is rendered from
         docker/.env by the container; in local dev it stays unconfigured and
         js/app-init.js is a no-op. Both are named generically so content filters
         / proxies that block "analytics" paths let them through. Load order
         matters: the config must run before the loader (and before the eruda gate
         below, which reads DEV from it). -->
    <script src="app-config.js"></script>
    <script src="js/app-init.js"></script>

    <!-- Internationalization (en / fr): a classic script so the later module
         (js/main.js) AND classic scripts (js/error-banner.js, js/dev-banner.js)
         can read window.__I18N__. Owns the UI message catalogue + the language
         choice; loaded early so static markup is filled at DOMContentLoaded. -->
    <script src="js/i18n.js"></script>

    <!-- App version (single source). Read by js/main.js (panel header) and
         js/dev-banner.js (WIP banner). -->
    <script src="version.js"></script>

    <!-- eruda on-screen debug console (desktop + mobile). Loaded ONLY when the
         URL carries ?debug=1, so normal production visitors never download or
         expose a debug console; runtime errors still surface to everyone via the
         red error banners (js/error-banner.js). eruda is vendored same-origin
         (public/vendor/eruda, see CSP) so the page pulls no third-party script.
         The entry button is pinned to the top-right corner (the panel covers the
         bottom on a phone), and re-pinned on resize because eruda's own resize
         handler resets it to the default bottom-right. -->
    <script>
      (function () {
        if (new URLSearchParams(location.search).get("debug") !== "1") return;
        var s = document.createElement("script");
        s.src = "vendor/eruda/eruda.js";
        s.onload = function () {
          if (!window.eruda) return;
          window.eruda.init();
          var topRight = function () {
            // eruda reverts to the default bottom-right if x is out of range, so
            // keep it a button-width in from the right edge.
            window.eruda.position({ x: window.innerWidth - 50, y: 10 });
          };
          topRight();
          window.addEventListener("resize", topRight);
        };
        document.head.appendChild(s);
      })();
    </script>

    <!-- three.js via import map so the ES modules in js/ can `import "three"`
         and "three/addons/...". Vendored locally under public/vendor/three (three
         r170: the core module + only the OrbitControls / CSS2DRenderer addons we
         use), so the site pulls no third-party script at runtime: nothing to
         execute from a CDN that could be tampered with, and it works offline. To
         upgrade, refetch those files from the matching three.js tag and bump the
         path. -->
    <script type="importmap">
      {
        "imports": {
          "three": "./vendor/three/three.module.js",
          "three/addons/": "./vendor/three/addons/"
        }
      }
    </script>

    <style>
      :root {
        --panel-bg: rgba(20, 24, 31, 0.82);
        --text: #e7ecf2;
        --muted: #9aa6b3;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0e1116;
        color: var(--text);
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        /* Let OrbitControls handle all touch gestures instead of the browser. */
        touch-action: none;
      }
      #scene { display: block; width: 100vw; height: 100vh; }

      .panel {
        position: fixed;
        /* Above the CSS2D label overlay so corner controls stay clickable and
           are never visually covered by a structure label. */
        z-index: 5;
        background: var(--panel-bg);
        backdrop-filter: blur(6px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        padding: 14px 16px;
        font-size: 14px;
        user-select: none;
      }
      /* Single bottom-left control panel. padding:0 so the collapse header and
         body manage their own; capped + scrollable so a tall expanded legend
         never runs off the top of the screen. */
      #controls {
        bottom: 12px;
        left: 12px;
        width: 240px;
        padding: 0;
        max-height: calc(100vh - 24px);
        overflow-y: auto;
      }
      /* Portrait / vertical screens: a bottom-left box would cover the centered
         brain, so make the controls span the FULL WIDTH but only the bottom HALF
         of the screen. js/main.js (updatePanelPan) then pushes the rendered brain
         straight up into the clear top section, so you can see the brain and use
         the menus at the same time. The 50vh cap + internal scroll keep a tall
         expanded legend inside that bottom half. */
      @media (orientation: portrait) {
        #controls {
          left: 8px;
          right: 8px;
          width: auto;
          bottom: 8px;
          max-height: 50vh;
        }
      }
      /* Hide the native scrollbar on the scrollable panels (they still scroll
         via wheel / touch / drag); the chunky bar looks out of place over the
         dark glass UI. scrollbar-width covers Firefox, ::-webkit-scrollbar
         covers Chromium/WebKit. */
      #controls,
      #legend-body,
      #receptors-body,
      #search-results {
        scrollbar-width: none;
      }
      #controls::-webkit-scrollbar,
      #legend-body::-webkit-scrollbar,
      #receptors-body::-webkit-scrollbar,
      #search-results::-webkit-scrollbar {
        width: 0;
        height: 0;
      }
      #controls-body { padding: 0 14px 14px; }
      /* Shared collapse header (the panel title + the nested legend): a full-
         width button with a chevron that points down when expanded. */
      .collapse-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        width: 100%;
        padding: 12px 14px;
        font: inherit;
        font-weight: 600;
        color: var(--text);
        background: none;
        border: 0;
        cursor: pointer;
        user-select: none;
      }
      .collapse-header .chevron { transition: transform 0.15s ease; color: var(--muted); }
      .collapse-header[aria-expanded="true"] .chevron { transform: rotate(90deg); }
      /* Version tag next to the panel title (set from version.js by js/main.js). */
      .collapse-header .version { font-weight: 400; font-size: 11px; color: var(--muted); }
      .row { margin: 12px 0; }
      .row label { display: block; margin-bottom: 6px; color: var(--muted); }
      .row.inline label {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--text);
        margin: 0;
        cursor: pointer;
      }
      input[type="range"] { width: 100%; accent-color: #4e79a7; }
      input[type="checkbox"] { width: 16px; height: 16px; accent-color: #4e79a7; }

      /* Shared pill button (the "show all names" toggle). The .active state is
         set from JS when names are forced on. */
      .btn {
        width: 100%;
        padding: 8px 10px;
        font: inherit;
        color: var(--text);
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        cursor: pointer;
      }
      .btn:hover { background: rgba(255, 255, 255, 0.12); }
      .btn.active {
        background: #4e79a7;
        border-color: #4e79a7;
        color: #fff;
      }

      /* Reset-view + search: a row of icon buttons at the top of the panel body,
         just before the sliders. */
      /* Three icon buttons spread across the row: keyboard (left), reset
         (center), search (right). space-between puts the first hard left, the
         last hard right and the middle one centered. */
      .toolbar-row { display: flex; justify-content: space-between; gap: 8px; margin: 2px 0 4px; }

      /* Accordion: opening the Legend or About section hides every control above
         it (the language switch, the reset/search row, the two sliders and the
         Auto-rotate checkbox, all tagged .collapsible-control) so the open
         section's content does not push the panel tall. Only the Legend and About
         headers stay. Only one of Legend/About is open at a time (enforced in
         js/main.js). A section can only be opened when the controls are visible
         (no search), so this never hides the toolbar mid-search. */
      #controls.section-open .collapsible-control { display: none; }

      /* Settings / Details tabs at the top of the panel body. The bar ships
         hidden and is revealed (js/main.js, createPanelTabs) only while a detail
         (structure / connection / receptor) is open; the Details tab then holds
         the info that used to live in a separate bottom-right panel. */
      .panel-tabs {
        display: flex;
        align-items: center;
        gap: 4px;
        margin: 4px 0 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      /* The `hidden` attribute (toggled by createPanelTabs when a detail is
         opened / dismissed) must win over the display:flex above; without this
         the attribute is overridden and an empty Settings/Details bar shows even
         when no detail is open. */
      .panel-tabs[hidden] { display: none; }
      .panel-tab {
        padding: 6px 10px;
        font: inherit;
        font-size: 13px;
        font-weight: 600;
        color: var(--muted);
        background: none;
        border: 0;
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
        cursor: pointer;
      }
      .panel-tab:hover { color: var(--text); }
      .panel-tab.active { color: var(--text); border-bottom-color: #4e79a7; }
      /* The Settings tab is pinned: it never shrinks and never scrolls away, so
         it is always reachable as the first tab. */
      .panel-tab.pinned { flex: 0 0 auto; }
      /* The scrollable strip of opened detail tabs, to the right of the pinned
         Settings tab. It takes the remaining width and scrolls horizontally when
         the tabs overflow the narrow panel (wheel on desktop, touch-drag via
         touch-action: pan-x on mobile). */
      .detail-tabs {
        display: flex;
        align-items: stretch;
        gap: 2px;
        flex: 1 1 auto;
        min-width: 0;
        overflow-x: auto;
        overflow-y: hidden;
        scrollbar-width: thin;
        touch-action: pan-x;
      }
      .detail-tabs::-webkit-scrollbar { height: 4px; }
      .detail-tabs::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.18);
        border-radius: 2px;
      }
      /* One opened detail. Label (ellipsized) + a × close affordance; reorderable
         by long-press drag (.dragging while lifted). */
      .detail-tab {
        display: inline-flex;
        align-items: center;
        gap: 2px;
        flex: 0 0 auto;
        max-width: 130px;
        padding: 6px 4px 6px 9px;
        font: inherit;
        font-size: 12px;
        font-weight: 600;
        color: var(--muted);
        background: none;
        border: 0;
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
        cursor: pointer;
        white-space: nowrap;
      }
      .detail-tab:hover { color: var(--text); }
      .detail-tab.active { color: var(--text); border-bottom-color: #4e79a7; }
      .detail-tab.dragging { opacity: 0.55; }
      .detail-tab-label {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .detail-tab-close {
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 16px;
        height: 16px;
        border-radius: 4px;
        font-size: 15px;
        line-height: 1;
        color: var(--muted);
      }
      .detail-tab-close:hover { color: var(--text); background: rgba(255, 255, 255, 0.14); }
      #details-pane { user-select: text; }
      .tool-btn {
        display: grid;
        place-items: center;
        width: 36px;
        height: 36px;
        padding: 0;
        color: var(--text);
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        cursor: pointer;
      }
      .tool-btn:hover { background: rgba(255, 255, 255, 0.12); }
      .tool-btn.active { background: #4e79a7; border-color: #4e79a7; color: #fff; }
      /* currentColor on the SVG strokes makes the icons follow the button text
         color, including the blue .active state of the search toggle. */
      .tool-btn svg { width: 18px; height: 18px; display: block; }

      /* Keyboard-shortcuts help popup (#shortcuts-modal): a full-screen dimmed
         overlay centering a small dialog (reuses .panel for the glass look). */
      .modal-overlay {
        position: fixed;
        inset: 0;
        z-index: 60; /* above the panels (5) and the banners / status (50) */
        display: grid;
        place-items: center;
        padding: 16px;
        background: rgba(0, 0, 0, 0.55);
      }
      /* The hidden attribute must win over the display:grid above (same fix as
         .panel-tabs), else the popup would show on load. */
      .modal-overlay[hidden] { display: none; }
      .modal {
        position: relative; /* .panel is fixed; the overlay does the centering */
        width: min(340px, 100%);
        max-height: calc(100vh - 32px);
        overflow-y: auto;
      }
      .modal h2 { margin: 2px 0 14px; font-size: 15px; padding-right: 20px; }
      .modal .info-close {
        position: absolute;
        top: 12px;
        right: 14px;
        width: 24px;
        height: 24px;
        padding: 0;
        font-size: 18px;
        line-height: 1;
        color: var(--muted);
        background: none;
        border: 0;
        cursor: pointer;
      }
      .modal .info-close:hover { color: var(--text); }
      /* key -> action rows: a two-column grid (the key(s) | the action). */
      #shortcuts-list {
        margin: 0;
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 10px 14px;
        align-items: center;
      }
      #shortcuts-list dt { margin: 0; display: flex; gap: 4px; }
      #shortcuts-list dd { margin: 0; color: var(--muted); font-size: 13px; }
      kbd {
        display: inline-block;
        min-width: 22px;
        padding: 2px 7px;
        font: inherit;
        font-size: 12px;
        font-weight: 600;
        text-align: center;
        color: var(--text);
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-bottom-width: 2px;
        border-radius: 6px;
      }

      /* Language switch: a small EN/FR segmented control at the top of the panel
         body. The active language is highlighted (blue, like .tool-btn.active). */
      .lang-switch { display: flex; gap: 4px; margin: 0 0 6px; }
      .lang-btn {
        flex: 0 0 auto;
        padding: 2px 8px;
        font: inherit;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.04em;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 6px;
        cursor: pointer;
      }
      .lang-btn:hover { background: rgba(255, 255, 255, 0.12); color: var(--text); }
      .lang-btn.active { background: #4e79a7; border-color: #4e79a7; color: #fff; }

      /* Search shown in place of #controls-main while the magnifier is on. */
      #search { margin-top: 12px; }
      #search-input {
        width: 100%;
        padding: 8px 10px;
        font: inherit;
        color: var(--text);
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        outline: none;
      }
      #search-input:focus { border-color: #4e79a7; }
      #search-results {
        list-style: none;
        margin: 6px 0 0;
        padding: 0;
        max-height: 240px;
        overflow-y: auto;
      }
      #search-results li {
        padding: 7px 9px;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
      }
      #search-results li:hover,
      #search-results li.active { background: rgba(255, 255, 255, 0.12); }
      #search-results li.empty { color: var(--muted); cursor: default; }
      #search-results li.empty:hover { background: none; }
      /* Keyboard roving highlight for arrow-key navigation inside an open
         accordion section (Legend / Receptors / Drugs). A clear outline reads on
         any row or button regardless of its own background. */
      .kbd-active {
        outline: 2px solid rgba(255, 255, 255, 0.55);
        outline-offset: -2px;
        border-radius: 4px;
      }

      /* Floating HTML labels (CSS2DRenderer) naming each structure. Centered on
         the structure by the renderer; must not eat pointer events. No box: the
         name is white glyphs with an outline in the structure's own color (set
         per-label via --label-color in js/labels.js) plus a soft black halo, so
         it stays legible over any region and overlapping labels don't hide each
         other behind opaque rectangles. */
      .structure-label,
      .connection-label {
        pointer-events: none;
        user-select: none;
        white-space: nowrap;
        font-size: 13px;
        font-weight: 700;
        color: #ffffff;
        background: none;
        --label-color: #000;
        text-shadow:
          -1px -1px 0 var(--label-color), 0 -1px 0 var(--label-color), 1px -1px 0 var(--label-color),
          -1px  0   0 var(--label-color),                              1px  0   0 var(--label-color),
          -1px  1px 0 var(--label-color), 0  1px 0 var(--label-color), 1px  1px 0 var(--label-color),
           0    0   4px rgba(0, 0, 0, 0.95);
      }
      /* Connection (pathway) labels: a touch smaller and italic so they read as
         the projection name rather than a region name. Color comes from an
         inline --label-color set per arrow (its kind color) in js/labels.js. */
      .connection-label {
        font-size: 11px;
        font-weight: 600;
        font-style: italic;
      }

      /* Legend nested inside the control panel, set off by a hairline. Its
         header has no side padding (the panel body already provides it). */
      #legend,
      #receptors,
      #drugs,
      #about {
        margin-top: 8px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }
      #legend .collapse-header,
      #receptors .collapse-header,
      #drugs .collapse-header,
      #about .collapse-header { padding: 10px 0 4px; }
      /* About blurb: muted body text with readable links. */
      #about-body { padding: 2px 0 6px; }
      .about-text {
        margin: 8px 0;
        font-size: 12px;
        line-height: 1.5;
        color: var(--muted);
      }
      .about-text a { color: #8fb6e6; text-decoration: underline; }
      #legend-body,
      #receptors-body,
      #drugs-body {
        max-height: 42vh;
        overflow-y: auto;
      }
      /* Receptor rows reuse the .legend-item styling; the family headings reuse
         the legend h2 look (added to those rules below). A "stub" receptor (no
         CNS role) renders muted + non-clickable. */
      #receptors-body { padding: 4px 0 8px; }
      .legend-item.muted { opacity: 0.4; cursor: default; }
      .legend-item.muted:hover { color: inherit; }

      /* Drugs section: a small filter box pinned at the top of the (scrolling)
         body, then category headings + drug rows (reusing .legend-item; rows are
         coloured by the drug's dominant net-effect swatch). The filter reuses the
         search-input look. */
      #drugs-body { padding: 4px 0 8px; }
      .drugs-filter {
        width: 100%;
        padding: 7px 9px;
        margin: 2px 0 8px;
        font: inherit;
        font-size: 13px;
        color: var(--text);
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        outline: none;
        box-sizing: border-box;
      }
      .drugs-filter:focus { border-color: #4e79a7; }
      .drug-item[hidden] { display: none; }
      .drugs-empty { margin: 6px 2px; font-size: 12px; }
      /* Legend action buttons (show-all-names, hide-projections) stack at the
         top, spaced off the generated category rows below them. */
      #legend-actions {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin: 4px 0 12px;
      }
      #legend-actions .btn { margin: 0; }
      /* Arrow colour-mode switch (Neurotransmitter | Potential): a small heading
         over a two-button segmented control, the active option highlighted blue
         like the language switch / .tool-btn.active. Sits in #legend-actions. */
      .mode-switch { display: flex; flex-direction: column; gap: 6px; }
      .mode-label { color: var(--muted); font-size: 12px; }
      .mode-options { display: flex; gap: 4px; }
      .mode-btn {
        flex: 1 1 0;
        padding: 6px 8px;
        font: inherit;
        font-size: 12px;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 6px;
        cursor: pointer;
      }
      .mode-btn:hover { background: rgba(255, 255, 255, 0.12); color: var(--text); }
      .mode-btn.active { background: #4e79a7; border-color: #4e79a7; color: #fff; }
      #legend-body h2:first-child,
      #receptors-body h2:first-child,
      #drugs-list h2:first-child { margin-top: 0; }
      #legend h2:first-child { margin-top: 0; }
      #legend h2,
      #receptors h2,
      #drugs h2 {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        margin: 0 0 8px;
      }
      /* Receptor family + drug category headings stack one after another, so
         space them apart. */
      #receptors-body h2,
      #drugs-list h2 { margin: 14px 0 8px; }
      /* Clickable category headings toggle the whole group; same selected/dimmed
         states as the rows. */
      #legend h2.clickable { cursor: pointer; }
      #legend h2.clickable:hover { color: #fff; }
      #legend h2.selected { color: #fff; }
      #legend h2.dimmed { opacity: 0.4; }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 4px 0;
        font-size: 13px;
      }
      /* Structure rows are clickable to isolate that region (projection-kind
         rows are not). A subtle hover hints at it. */
      .legend-item.clickable { cursor: pointer; }
      .legend-item.clickable:hover { color: #fff; }
      /* Isolate/focus mode (a structure row was clicked): the picked rows stay
         lit and bold, the rest grey out, mirroring the dimmed structures. */
      .legend-item.selected { font-weight: 600; color: #fff; }
      .legend-item.dimmed { opacity: 0.35; }
      /* A muted kind tag after a non-receptor target's name (e.g. "transporter")
         in the merged Receptors & targets section. */
      .legend-tag { color: var(--muted); font-size: 11px; margin-left: auto; }
      .swatch {
        width: 14px;
        height: 14px;
        border-radius: 3px;
        flex: 0 0 auto;
      }
      .swatch.line { height: 4px; border-radius: 2px; }

      /* Detail info (structure / connection / receptor / target / drug) lives in
         the Details pane of the main panel, shown by the active detail tab (see
         .panel-tabs / .detail-tabs above); the .info-* content styles below are
         reused there. Each detail tab carries its own × close affordance. */
      .info-title { font-size: 14px; font-weight: 600; margin: 0 0 8px; }
      .info-route { font-size: 13px; color: var(--text); margin-bottom: 10px; }
      .info-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: var(--muted);
        text-transform: capitalize;
        margin-bottom: 10px;
      }
      .info-desc {
        font-size: 13px;
        line-height: 1.45;
        color: var(--text);
        margin: 0 0 12px;
      }
      .info-sources h3,
      .info-connections h3,
      .info-bindings h3,
      .info-locations h3 {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        margin: 0 0 6px;
      }
      .info-sources ul,
      .info-connections ul,
      .info-bindings ul,
      .info-locations ul { list-style: none; margin: 0; padding: 0; }
      /* Receptor classification facts: label / value rows. */
      .info-facts {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin: 0 0 12px;
      }
      .info-fact { display: flex; gap: 8px; font-size: 12px; line-height: 1.4; }
      .info-fact .fact-label { color: var(--muted); flex: 0 0 92px; }
      .info-fact .fact-value {
        color: var(--text);
        display: flex;
        align-items: center;
        gap: 6px;
        text-transform: capitalize;
      }
      /* Receptor "found in" region list. */
      .info-locations { margin-top: 4px; }
      .info-locations li { font-size: 12px; line-height: 1.5; color: var(--text); }
      /* A region row that resolves to a modeled structure jumps to it on click. */
      .info-locations li.clickable { cursor: pointer; }
      .info-locations li.clickable:hover { color: #8fb6e6; }
      .info-sources li {
        font-size: 12px;
        line-height: 1.4;
        color: var(--text);
        margin-bottom: 8px;
      }
      .info-sources a { color: #8fb6e6; text-decoration: underline; }
      /* No verified link yet: a small orange pill badge instead of a bare link.
         Used in the connection/drug source list and the target Reference row. */
      .info-sources .src-todo,
      .info-wiki .src-todo {
        display: inline-block;
        vertical-align: middle;
        margin-left: 6px;
        padding: 1px 8px;
        border-radius: 999px;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #f0a23c;
        background: rgba(240, 162, 60, 0.15);
        border: 1px solid rgba(240, 162, 60, 0.5);
      }
      /* Structure panel: a clickable list of the structure's connections. */
      .info-group { font-size: 12px; color: var(--muted); margin: -4px 0 12px; }
      .info-wiki { font-size: 12px; margin: -6px 0 12px; }
      .info-wiki a { color: #8fb6e6; text-decoration: underline; }
      /* "?" caveat badge next to every Source / Reference: the citations + links
         are LLM-inferred and not yet human-checked. The tooltip shows on hover
         (desktop) and is pinned on click/tap via .show (touch, where :hover never
         fires). The bubble is positioned relative to the full-width source/wiki
         container (which is position:relative), not the tiny icon, so its
         left:0/right:0 span can never overflow + be clipped by the narrow panel. */
      .info-sources, .info-wiki { position: relative; }
      .help-icon {
        display: inline-flex;
        vertical-align: middle;
        margin-left: 6px;
      }
      .help-dot {
        width: 15px;
        height: 15px;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--muted);
        border-radius: 999px;
        background: transparent;
        color: var(--muted);
        font: 600 10px/1 inherit;
        cursor: pointer;
      }
      .help-dot:hover { color: var(--text); border-color: var(--text); }
      .help-tip {
        display: none;
        position: absolute;
        left: 0;
        right: 0;
        bottom: calc(100% + 4px);
        padding: 8px 10px;
        background: rgba(18, 18, 22, 0.98);
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 6px;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.5);
        color: var(--text);
        font: 400 11px/1.45 inherit;
        letter-spacing: normal;
        text-transform: none;
        z-index: 60;
      }
      .help-icon:hover .help-tip,
      .help-icon:focus-within .help-tip,
      .help-icon.show .help-tip { display: block; }
      .info-connections li {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        line-height: 1.4;
        color: var(--text);
        padding: 4px 0;
        cursor: pointer;
      }
      .info-connections li:hover { color: #8fb6e6; }
      .info-connections .conn-label { flex: 1; }
      .info-connections .conn-dir { color: var(--muted); }

      /* Drug panel: the "Acts on" molecular-target list. Each row is the
         effect swatch + the target name + (action · note); a speculative
         binding is dimmed + italic. */
      .info-bindings { margin: 0 0 12px; }
      .info-bindings li {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        font-size: 12px;
        line-height: 1.4;
        color: var(--text);
        padding: 4px 0;
      }
      .info-bindings .swatch.line { margin-top: 5px; }
      .info-bindings .bind-text {
        display: flex;
        flex-direction: column;
        gap: 1px;
        min-width: 0;
      }
      .info-bindings .bind-target { font-weight: 600; }
      .info-bindings .bind-action { color: var(--muted); font-size: 11px; }
      .info-bindings li.tentative { opacity: 0.6; font-style: italic; }
      /* A binding whose target is itself focusable (a transporter / enzyme /
         receptor in the merged "Receptors & targets" list): clicking the row
         focuses that target, exactly like its legend row, so the bold target
         name reads as a link on hover. */
      .info-bindings li.clickable { cursor: pointer; }
      .info-bindings li.clickable:hover .bind-target { color: #8fb6e6; }

      #status {
        position: fixed;
        /* Sit clear of however many banners are stacked at the top: the stack
           publishes its height as --banners-height (0 when empty). */
        top: calc(12px + var(--banners-height, 0px));
        left: 50%;
        transform: translateX(-50%);
        background: var(--panel-bg);
        padding: 8px 14px;
        border-radius: 8px;
        font-size: 13px;
        display: none;
      }

      /* Top banner stack: a fixed full-width column holding the optional WIP
         banner (js/dev-banner.js) and any error banners (js/error-banner.js).
         Stacking them in one flex column means multiple banners pile up instead
         of overlapping; js/error-banner.js republishes the stack height to
         --banners-height so the #status pill stays below it. */
      #banners {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 50; /* above the panels (z-index 5) and the label overlay */
        display: flex;
        flex-direction: column;
      }
      /* Optional "work in progress" banner (shown only when DEV=1; see
         js/dev-banner.js). A full-width amber warning bar. */
      #dev-banner {
        background: rgba(176, 124, 24, 0.95);
        color: #fff;
        font-size: 13px;
        line-height: 1.35;
        text-align: center;
        padding: 9px 44px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.25);
        backdrop-filter: blur(6px);
        user-select: none;
      }
      #dev-banner strong { font-weight: 600; }
      /* Red, dismissible error banners (js/error-banner.js): the same shape as
         the dev banner but red, each with a × close button, stacked under it. */
      .error-banner {
        position: relative;
        background: rgba(150, 30, 35, 0.96);
        color: #ffe3e5;
        font-size: 13px;
        line-height: 1.35;
        text-align: center;
        padding: 9px 44px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(6px);
      }
      .banner-close {
        position: absolute;
        top: 6px;
        right: 12px;
        padding: 0 4px;
        font-size: 18px;
        line-height: 1.2;
        color: inherit;
        background: none;
        border: 0;
        cursor: pointer;
        opacity: 0.8;
      }
      .banner-close:hover { opacity: 1; }
    </style>
  </head>

  <body>
    <canvas id="scene"></canvas>

    <!-- Top banner stack: the optional WIP banner (js/dev-banner.js, hidden
         unless DEV=1) plus any error banners (js/error-banner.js) pile up here
         in a column instead of overlapping. -->
    <div id="banners">
      <div id="dev-banner" role="status" aria-live="polite" hidden></div>
    </div>

    <div id="status"></div>

    <!-- Single bottom-left "neurarium" panel: a collapsible window holding the
         reset/search buttons, the two sliders, auto-rotate, and the nested
         (collapsed) legend. Searching replaces the panel body in place rather
         than opening a popup (see wireToolbar in js/main.js). When a detail
         (structure / connection / receptor) is picked, a Settings/Details tab bar
         appears at the top and the detail shows in the Details pane (see
         createPanelTabs / createInfoPanel in js/main.js). -->
    <div id="controls" class="panel">
      <button type="button" id="controls-toggle" class="collapse-header" aria-expanded="true">
        <span>neurarium <span class="version" id="app-version"></span></span>
        <span class="chevron" aria-hidden="true">&#9656;</span>
      </button>

      <div id="controls-body">
        <!-- Browser-style detail tabs. Shipped hidden; revealed once the first
             detail (structure / connection / receptor / target / drug) is picked.
             The pinned Settings tab is always first; each detail opens its own
             tab (with a × to close it) in the scrollable #detail-tabs strip,
             JS-populated. Wired in js/main.js (createPanelTabs). -->
        <div id="panel-tabs" class="panel-tabs" role="tablist" hidden>
          <button type="button" id="tab-settings" class="panel-tab pinned active" role="tab" aria-selected="true" data-i18n="panel.tabSettings"></button>
          <div id="detail-tabs" class="detail-tabs"></div>
        </div>

        <!-- Settings pane: the normal controls. Hidden while the Details tab is
             active. -->
        <div id="settings-pane">
        <!-- Language switch (en / fr). Tagged .collapsible-control so it hides
             (with the sliders + auto-rotate) while a section is open. Buttons
             carry data-lang; js/i18n.js marks the active one and reloads on
             switch. -->
        <div id="lang-switch" class="lang-switch collapsible-control" role="group" aria-label="Language">
          <button type="button" class="lang-btn" data-lang="en">EN</button>
          <button type="button" class="lang-btn" data-lang="fr">FR</button>
        </div>

        <!-- Reset the view (handy after panning) + toggle search. Sit just
             before the sliders, and stay visible while searching so the
             magnifier doubles as the way back. SVG icons use currentColor so
             they follow the button text color (incl. the active blue state). -->
        <div class="toolbar-row collapsible-control">
          <!-- Keyboard-shortcuts help (left): opens the #shortcuts-modal popup
               (also opened with the ? key). Keyboard icon: a rounded panel with
               key dots + a space bar (zero-length round-capped lines = dots). -->
          <button type="button" id="shortcuts-toggle" class="tool-btn" data-i18n-attr="title:shortcuts.title, aria-label:shortcuts.title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="6" width="20" height="12" rx="2" />
              <line x1="6" y1="10" x2="6" y2="10" />
              <line x1="10" y1="10" x2="10" y2="10" />
              <line x1="14" y1="10" x2="14" y2="10" />
              <line x1="18" y1="10" x2="18" y2="10" />
              <line x1="8" y1="14" x2="16" y2="14" />
            </svg>
          </button>
          <!-- Reset (center): recenter + re-frame the whole brain. -->
          <button type="button" id="reset-view" class="tool-btn" data-i18n-attr="title:toolbar.reset, aria-label:toolbar.reset">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <circle cx="12" cy="12" r="6" />
              <line x1="12" y1="1.5" x2="12" y2="5" />
              <line x1="12" y1="19" x2="12" y2="22.5" />
              <line x1="1.5" y1="12" x2="5" y2="12" />
              <line x1="19" y1="12" x2="22.5" y2="12" />
            </svg>
          </button>
          <!-- Search (right): swaps a search box in for the panel body. -->
          <button type="button" id="search-toggle" class="tool-btn" data-i18n-attr="title:toolbar.search, aria-label:toolbar.searchAria">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <circle cx="11" cy="11" r="7" />
              <line x1="16.5" y1="16.5" x2="21" y2="21" />
            </svg>
          </button>
        </div>

        <!-- Normal controls; hidden (replaced by #search) while searching. -->
        <div id="controls-main">
          <div class="row collapsible-control">
            <label for="explode" data-i18n="panel.separate"></label>
            <!-- Default 0 so the page loads with the regions locked together as
                 a whole brain; dragging right blows it apart to reveal deep
                 nuclei. -->
            <input type="range" id="explode" min="0" max="1" step="0.01" value="0" />
          </div>

          <div class="row collapsible-control">
            <label for="transparency" data-i18n="panel.transparency"></label>
            <!-- The slider value is the material opacity; left = more transparent. -->
            <input type="range" id="transparency" min="0.1" max="1" step="0.01" value="1" />
          </div>

          <div class="row inline collapsible-control">
            <!-- On by default so the brain slowly turns on load; picking a
                 structure or projection turns it off (see js/main.js) so the
                 thing you clicked holds still. Tagged .collapsible-control so it
                 hides with the sliders while a section is open. -->
            <label>
              <input type="checkbox" id="autorotate" checked />
              <span data-i18n="panel.autorotate"></span>
            </label>
          </div>

          <div class="row inline collapsible-control">
            <!-- "See inside": hide the camera-facing structures each frame so the
                 deep nuclei aren't blocked by the near cortex (createNearCull in
                 js/main.js). Off by default. Collapsible like auto-rotate. -->
            <label>
              <input type="checkbox" id="see-inside" />
              <span data-i18n="panel.seeInside"></span>
            </label>
          </div>

          <!-- Nested legend, collapsed by default (body ships `hidden`). Its
               first element is the "Show all names" button (kept first across
               rebuilds by buildLegend in js/main.js); the category rows below
               are generated from the dataset so colors never drift from what is
               actually rendered. -->
          <div id="legend">
            <button type="button" id="legend-toggle" class="collapse-header" aria-expanded="false">
              <span data-i18n="panel.legend"></span>
              <span class="chevron" aria-hidden="true">&#9656;</span>
            </button>
            <div id="legend-body" hidden>
              <!-- Action buttons kept across buildLegend's rebuilds (it preserves
                   this whole container, then appends the generated rows after). -->
              <div id="legend-actions">
                <!-- Forces every structure name on/off (vs. hover, one at a time). -->
                <button type="button" id="toggle-names" class="btn" aria-pressed="false" data-i18n="legend.showNames">
                </button>
                <!-- Hides every projection arrow (off by default: arrows shown). -->
                <button type="button" id="toggle-projections" class="btn" aria-pressed="false" data-i18n="legend.hideProjections">
                </button>
                <!-- Arrow colour mode: a two-state switch. "Neurotransmitter"
                     (default) colours arrows per molecule; "Potential" switches
                     to the coarse excitatory (red) / inhibitory (blue) sign view.
                     js/main.js marks the active button, recolours arrows and
                     rebuilds the Projections rows. Lives inside #legend-actions
                     so it sits right above the projection colour rows it drives
                     (and is preserved across legend rebuilds with them). -->
                <div id="color-mode" class="mode-switch" role="group" aria-labelledby="color-mode-label">
                  <span class="mode-label" id="color-mode-label" data-i18n="panel.arrowColors"></span>
                  <div class="mode-options">
                    <button type="button" class="mode-btn active" data-mode="nt" aria-pressed="true" data-i18n="panel.colorNt"></button>
                    <button type="button" class="mode-btn" data-mode="sign" aria-pressed="false" data-i18n="panel.colorPotential"></button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Receptors & targets: collapsed by default, an accordion peer of
               Legend / About (only one open at a time). The body is generated from
               the dataset by js/main.js (buildTargetLegend): every receptor plus
               every non-receptor drug target (transporters, enzymes, channels),
               grouped by neurotransmitter system, each row focusable to scatter
               glowing dots over the regions it sits in and dim the rest. -->
          <div id="receptors">
            <button type="button" id="receptors-toggle" class="collapse-header" aria-expanded="false">
              <span data-i18n="panel.receptors"></span>
              <span class="chevron" aria-hidden="true">&#9656;</span>
            </button>
            <div id="receptors-body" hidden></div>
          </div>

          <!-- Drugs: collapsed by default, an accordion peer of Legend /
               Receptors / About. A small filter box at the top narrows the list
               (by name, class or target); the list is generated from the dataset
               by js/main.js (buildDrugLegend) grouped by category. Clicking a row
               focuses that drug: it dims the brain to the regions it acts on and
               animates its effect on each target (see js/drug-anim.js). -->
          <div id="drugs">
            <button type="button" id="drugs-toggle" class="collapse-header" aria-expanded="false">
              <span data-i18n="panel.drugs"></span>
              <span class="chevron" aria-hidden="true">&#9656;</span>
            </button>
            <div id="drugs-body" hidden>
              <input type="text" id="drugs-filter" class="drugs-filter" data-i18n-attr="placeholder:drugs.filter" autocomplete="off" />
              <div id="drugs-list"></div>
            </div>
          </div>

          <!-- About: collapsed by default (body ships `hidden`), mirroring the
               legend. The "Source code" link's href is set from app-config.js
               sourceUrl by js/main.js (its row is removed if no valid url). -->
          <div id="about">
            <button type="button" id="about-toggle" class="collapse-header" aria-expanded="false">
              <span data-i18n="panel.about"></span>
              <span class="chevron" aria-hidden="true">&#9656;</span>
            </button>
            <div id="about-body" hidden>
              <!-- Text + embedded links filled from js/i18n.js (data-i18n-html)
                   so the prose lives in one place (the catalogue), translated. -->
              <p class="about-text" data-i18n-html="about.p1"></p>
              <p class="about-text" data-i18n-html="about.p2"></p>
              <p class="about-text" data-i18n-html="about.p3"></p>
              <p class="about-text" id="about-source-row">
                <a id="about-source" href="#" target="_blank" rel="noopener noreferrer" data-i18n="about.sourceCode"></a>
              </p>
              <!-- License line: independent of the source-code row (which is
                   removed when no sourceUrl is configured), so the licence always
                   shows. The link points at the canonical AGPL-3.0 text. -->
              <p class="about-text" data-i18n-html="about.license"></p>
            </div>
          </div>
        </div>

        <!-- Search shown in lieu of #controls-main while active. Matches both
             structures (by name) and connections (by pathway label). -->
        <div id="search" hidden>
          <input type="text" id="search-input" data-i18n-attr="placeholder:search.placeholder" autocomplete="off" />
          <ul id="search-results"></ul>
        </div>
        </div><!-- #settings-pane -->

        <!-- Details pane: the detail (structure / connection / receptor) built by
             js/main.js (createInfoPanel) into #info-body. Shown when the Details
             tab is active, hidden otherwise. Replaces the old separate bottom-
             right info panel. -->
        <div id="details-pane" hidden>
          <div id="info-body"></div>
        </div>
      </div>
    </div>

    <!-- Keyboard-shortcuts help popup. A full-screen overlay with a centered
         dialog; the key/action rows are filled by js/main.js (wireShortcutsHelp)
         so each language's labels come from the i18n catalogue. Ships hidden;
         opened by the toolbar's keyboard button or the ? key, closed by the ×,
         a click on the backdrop, or Esc. -->
    <div id="shortcuts-modal" class="modal-overlay" hidden>
      <div class="modal panel" role="dialog" aria-modal="true" aria-labelledby="shortcuts-title">
        <button type="button" id="shortcuts-close" class="info-close" aria-label="Close">&times;</button>
        <h2 id="shortcuts-title" data-i18n="shortcuts.title"></h2>
        <dl id="shortcuts-list"></dl>
      </div>
    </div>

    <!-- Banner scripts: plain (need document.body + #banners to exist), so
         loaded at the end of the body. error-banner.js installs the global error
         handlers + the stacking container first (so later scripts' failures are
         caught and surfaced), then dev-banner.js fills the WIP banner. -->
    <script src="js/error-banner.js"></script>
    <script src="js/dev-banner.js"></script>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
